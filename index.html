<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram Clone</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #0f0f0f; color: #fff; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #app { width: 100%; max-width: 420px; height: 100%; max-height: 900px; background: #0f0f0f; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        @media (min-width: 600px) { #app { border-radius: 20px; border: 1px solid #333; box-shadow: 0 0 30px rgba(0,0,0,0.8); } }
        .page { display: none; height: 100%; flex-direction: column; overflow-y: auto; padding-bottom: 60px; }
        .page.active { display: flex; }
        .header { padding: 10px 15px; background: #0f0f0f; border-bottom: 1px solid #222; display: flex; align-items: center; height: 50px; position: sticky; top: 0; }
        .header h2 { flex: 1; font-size: 17px; font-weight: 600; }
        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 60px; background: #1a1a1a; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #aaa; font-size: 9px; cursor: pointer; padding: 3px 10px; }
        .nav-item i { font-size: 20px; margin-bottom: 2px; }
        .nav-item.active { color: #6ab2e4; }
        
        /* Auth */
        .auth-screen { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .auth-screen input { width: 100%; padding: 12px; background: #1f1f1f; border: 1px solid #333; border-radius: 10px; color: #fff; margin-bottom: 10px; }
        .auth-screen button { width: 100%; padding: 12px; background: #6ab2e4; border: none; border-radius: 10px; font-weight: bold; margin-top: 5px; cursor: pointer; }
        .auth-link { color: #6ab2e4; cursor: pointer; margin-top: 15px; font-size: 14px; }
        .auth-link:hover { text-decoration: underline; }
        
        /* Search */
        .search-input { width: 100%; padding: 12px; background: #1f1f1f; border: none; border-radius: 10px; color: #fff; margin: 10px; }
        .user-result { padding: 10px 15px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-result .avatar { width: 40px; height: 40px; border-radius: 50%; background: #444; display: flex; align-items: center; justify-content: center; }
        
        /* Chat */
        .chat-list-item { display: flex; padding: 10px 15px; border-bottom: 1px solid #222; cursor: pointer; align-items: center; gap: 10px; }
        .chat-list-item .avatar { width: 45px; height: 45px; border-radius: 50%; background: #444; display: flex; align-items: center; justify-content: center; }
        #chat-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f0f; z-index: 200; display: none; flex-direction: column; }
        #chat-window.open { display: flex; }
        .messages-area { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { padding: 8px 12px; border-radius: 12px; margin-bottom: 5px; max-width: 80%; font-size: 15px; }
        .msg.sent { background: #6ab2e4; color: #000; align-self: flex-end; }
        .msg.received { background: #1f1f1f; align-self: flex-start; }
        .input-area { display: flex; padding: 8px; background: #1f1f1f; gap: 8px; border-top: 1px solid #333; }
        .input-area input { flex: 1; padding: 10px; border-radius: 20px; border: none; background: #0f0f0f; color: white; }
        .input-area button { background: #6ab2e4; border: none; padding: 0 15px; border-radius: 20px; color: #000; font-weight: bold; cursor: pointer; }
        
        /* Stars */
        .stars-wrapper { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .balance-card { background: #1f1f1f; border-radius: 16px; padding: 15px; width: 100%; text-align: center; margin-top: 10px; }
        .balance-row { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 30px; font-weight: 700; }
        .balance-row i { color: #ffd700; font-size: 24px; }
        .balance-label { color: #aaa; font-size: 13px; margin: 4px 0 12px 0; }
        .btn-group { display: flex; gap: 8px; }
        .btn-blue { flex: 1; background: #6ab2e4; color: #000; border: none; border-radius: 30px; padding: 10px 0; font-weight: 600; font-size: 13px; cursor: pointer; }
        
        /* Hide/Show */
        #page-auth { display: flex; }
        #app-content { display: none; height: 100%; flex-direction: column; }
        #app-content.visible { display: flex; }

        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

<div id="app">

    <!-- AUTH ONLY -->
    <div id="page-auth" class="page active">
        <div class="header"><h2>Вход</h2></div>
        <div class="auth-screen" id="login-form">
            <input id="login-phone" placeholder="Номер (+888)">
            <input id="login-password" type="password" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <div id="auth-status" style="margin-top:10px; color:#aaa; font-size:13px;"></div>
            <div class="auth-link" onclick="showRegister()">Нет аккаунта? Зарегистрироваться</div>
        </div>

        <div class="auth-screen" id="register-form" style="display:none;">
            <input id="reg-username" placeholder="Никнейм">
            <input id="reg-password" type="password" placeholder="Пароль">
            <button onclick="register()">Зарегистрироваться</button>
            <div id="reg-status" style="margin-top:10px; color:#aaa; font-size:13px;"></div>
            <div class="auth-link" onclick="showLogin()">Уже есть аккаунт? Войти</div>
        </div>
    </div>

    <!-- APP CONTENT -->
    <div id="app-content">
        
        <!-- CHATS -->
        <div id="page-chats" class="page active">
            <div class="header"><h2>Чаты</h2></div>
            <div id="chat-list"></div>
        </div>

        <!-- SEARCH -->
        <div id="page-search" class="page">
            <div class="header"><h2>Поиск</h2></div>
            <input class="search-input" id="search-input" placeholder="Введите номер..." oninput="searchUser()">
            <div id="search-results"></div>
        </div>

        <!-- MARKET -->
        <div id="page-market" class="page">
            <div class="header"><h2>Маркет</h2></div>
            <div class="stars-wrapper">
                <div class="balance-card">
                    <div class="balance-row"><i class="fas fa-star"></i><span id="bal-text">5000</span></div>
                    <div class="balance-label">Ваш баланс</div>
                    <div class="btn-group"><button class="btn-blue" onclick="addStars()">Пополнить</button><button class="btn-blue">Статистика</button></div>
                </div>
            </div>
            <div style="padding:10px; color:#aaa; text-align:center;">Здесь скоро появятся NFT</div>
        </div>

        <!-- PROFILE -->
        <div id="page-profile" class="page">
            <div class="header"><h2>Профиль</h2></div>
            <div style="padding:20px; text-align:center;">
                <div style="width:80px; height:80px; border-radius:50%; background:#444; margin:0 auto; display:flex; align-items:center; justify-content:center; font-size:30px;">👤</div>
                <h3 id="profile-name">Гость</h3>
                <div style="color:#aaa; font-size:13px;">Номер: <span id="profile-phone">---</span></div>
                <div style="color:#ffd700; margin-top:5px;">Баланс: <span id="prof-bal">5000</span> ⭐</div>
            </div>
        </div>

        <!-- BOTTOM NAV -->
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('chats', this)"><i class="fas fa-comments"></i><span>Чаты</span></div>
            <div class="nav-item" onclick="switchTab('search', this)"><i class="fas fa-search"></i><span>Поиск</span></div>
            <div class="nav-item" onclick="switchTab('market', this)"><i class="fas fa-store"></i><span>Маркет</span></div>
            <div class="nav-item" onclick="switchTab('profile', this)"><i class="fas fa-user"></i><span>Профиль</span></div>
        </nav>

        <!-- CHAT WINDOW -->
        <div id="chat-window">
            <div class="header">
                <i class="fas fa-arrow-left back-btn" style="cursor:pointer;" onclick="closeChat()"></i>
                <h2 id="chat-partner-name">Чат</h2>
                <div style="width:30px;"></div>
            </div>
            <div class="messages-area" id="messages-container"></div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Сообщение...">
                <button onclick="sendMessage()">Отправить</button>
            </div>
        </div>

    </div>

</div>

<script>
    // ============================
    // FIREBASE
    // ============================
    const firebaseConfig = {
        apiKey: "AIzaSyDjM1lRbEKtCsaYe9e48pEPReh0AMe910U",
        authDomain: "nevergram-e1d62.firebaseapp.com",
        projectId: "nevergram-e1d62",
        storageBucket: "nevergram-e1d62.firebasestorage.app",
        messagingSenderId: "355130485889",
        appId: "1:355130485889:web:d6657f9d2cf8b4e28b3180",
        measurementId: "G-Q0YRVZ1W1E"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ============================
    // STATE
    // ============================
    let currentUser = null;
    let balance = 5000;
    let currentChatId = null;
    let chatUnsubscriber = null;

    // ============================
    // UI HELPERS
    // ============================
    function showRegister() {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('register-form').style.display = 'flex';
    }

    function showLogin() {
        document.getElementById('login-form').style.display = 'flex';
        document.getElementById('register-form').style.display = 'none';
    }

    // ============================
    // PHONE GENERATOR
    // ============================
    function generatePhone() {
        let phone = '+9';
        for (let i = 0; i < 9; i++) {
            phone += Math.floor(Math.random() * 10);
        }
        return phone;
    }

    // ============================
    // AUTH
    // ============================
    async function login() {
        const phone = document.getElementById('login-phone').value.trim();
        const password = document.getElementById('login-password').value.trim();
        const status = document.getElementById('auth-status');

        if (!phone || !password) {
            status.innerText = 'Заполните все поля';
            return;
        }

        try {
            const snapshot = await db.collection('users')
                .where('phone', '==', phone)
                .get();

            if (snapshot.empty) {
                status.innerText = 'Пользователь не найден';
                return;
            }

            const doc = snapshot.docs[0];
            const data = doc.data();
            if (data.password === password) {
                currentUser = { id: doc.id, ...data };
                status.innerText = 'Вход выполнен!';
                afterLogin();
            } else {
                status.innerText = 'Неверный пароль';
            }
        } catch (e) {
            status.innerText = 'Ошибка: ' + e.message;
        }
    }

    async function register() {
        const username = document.getElementById('reg-username').value.trim();
        const password = document.getElementById('reg-password').value.trim();
        const status = document.getElementById('reg-status');

        if (!username || !password) {
            status.innerText = 'Заполните все поля';
            return;
        }

        // Генерируем случайный номер
        const phone = generatePhone();

        try {
            const docRef = await db.collection('users').add({
                phone: phone,
                username: username,
                password: password,
                balance: 5000,
                createdAt: new Date()
            });

            currentUser = { 
                id: docRef.id, 
                phone: phone, 
                username: username, 
                balance: 5000 
            };
            status.innerText = 'Аккаунт создан! Ваш номер: ' + phone;
            afterLogin();
        } catch (e) {
            status.innerText = 'Ошибка: ' + e.message;
        }
    }

    function afterLogin() {
        document.getElementById('page-auth').style.display = 'none';
        document.getElementById('app-content').classList.add('visible');
        
        document.getElementById('profile-name').innerText = currentUser.username;
        document.getElementById('profile-phone').innerText = currentUser.phone;
        balance = currentUser.balance || 5000;
        updateBalance();
        loadChats();
        
        const chatsNav = document.querySelector('.nav-item:first-child');
        switchTab('chats', chatsNav);
    }

    // ============================
    // NAVIGATION
    // ============================
    function switchTab(tab, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + tab).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    // ============================
    // BALANCE
    // ============================
    function updateBalance() {
        document.getElementById('bal-text').innerText = balance;
        document.getElementById('prof-bal').innerText = balance;
    }

    function addStars() {
        balance += 100;
        updateBalance();
        if (currentUser) {
            db.collection('users').doc(currentUser.id).update({ balance: balance });
        }
    }

    // ============================
    // SEARCH
    // ============================
    async function searchUser() {
        const query = document.getElementById('search-input').value.trim();
        const container = document.getElementById('search-results');
        if (!query || query.length < 3) {
            container.innerHTML = '';
            return;
        }

        const snapshot = await db.collection('users')
            .where('phone', '==', query)
            .get();

        container.innerHTML = '';
        snapshot.forEach(doc => {
            const data = doc.data();
            if (data.phone === currentUser.phone) {
                container.innerHTML = '<div style="padding:10px; color:#aaa;">Это вы</div>';
                return;
            }
            container.innerHTML += `
                <div class="user-result" onclick="startChat('${doc.id}', '${data.username}', '${data.phone}')">
                    <div class="avatar">👤</div>
                    <div>
                        <div style="font-weight:bold;">${data.username}</div>
                        <div style="color:#aaa; font-size:12px;">${data.phone}</div>
                    </div>
                </div>
            `;
        });
    }

    // ============================
    // CHATS
    // ============================
    async function loadChats() {
        const container = document.getElementById('chat-list');
        container.innerHTML = '<div style="padding:20px; color:#aaa; text-align:center;">Загрузка...</div>';

        const snapshot = await db.collection('chats')
            .where('participants', 'array-contains', currentUser.phone)
            .get();

        container.innerHTML = '';
        if (snapshot.empty) {
            container.innerHTML = '<div style="padding:20px; color:#aaa; text-align:center;">Нет чатов. Найдите пользователя через поиск.</div>';
            return;
        }

        snapshot.forEach(doc => {
            const data = doc.data();
            const partnerPhone = data.participants.find(p => p !== currentUser.phone);
            const partnerName = data.participantNames?.[partnerPhone] || 'Неизвестно';
            container.innerHTML += `
                <div class="chat-list-item" onclick="openChat('${doc.id}', '${partnerName}')">
                    <div class="avatar">👤</div>
                    <div>
                        <div style="font-weight:bold;">${partnerName}</div>
                        <div style="color:#aaa; font-size:12px;">${partnerPhone}</div>
                    </div>
                </div>
            `;
        });
    }

    async function startChat(partnerId, partnerName, partnerPhone) {
        const snapshot = await db.collection('chats')
            .where('participants', '==', [currentUser.phone, partnerPhone])
            .get();

        let chatId;
        if (snapshot.empty) {
            const newChat = await db.collection('chats').add({
                participants: [currentUser.phone, partnerPhone],
                participantNames: {
                    [currentUser.phone]: currentUser.username,
                    [partnerPhone]: partnerName
                },
                createdAt: new Date()
            });
            chatId = newChat.id;
        } else {
            chatId = snapshot.docs[0].id;
        }

        openChat(chatId, partnerName);
        loadChats();
    }

    function openChat(chatId, name) {
        currentChatId = chatId;
        document.getElementById('chat-partner-name').innerText = name;
        document.getElementById('chat-window').classList.add('open');
        
        const container = document.getElementById('messages-container');
        container.innerHTML = '';

        if (chatUnsubscriber) chatUnsubscriber();

        chatUnsubscriber = db.collection('chats').doc(chatId).collection('messages')
            .orderBy('timestamp')
            .onSnapshot((snapshot) => {
                container.innerHTML = '';
                snapshot.forEach(doc => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = `msg ${data.sender === currentUser.phone ? 'sent' : 'received'}`;
                    div.innerText = data.text;
                    container.appendChild(div);
                });
                container.scrollTop = container.scrollHeight;
            });
    }

    function closeChat() {
        document.getElementById('chat-window').classList.remove('open');
        if (chatUnsubscriber) {
            chatUnsubscriber();
            chatUnsubscriber = null;
        }
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value;
        if (!text || !currentChatId || !currentUser) return;

        db.collection('chats').doc(currentChatId).collection('messages').add({
            sender: currentUser.phone,
            text: text,
            timestamp: new Date()
        });

        input.value = '';
    }

    // ============================
    // INIT
    // ============================
    updateBalance();
</script>

</body>
</html>
