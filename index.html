<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#17212b">
    <title>NeverGram - Мессенджер</title>
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithPhoneNumber, RecaptchaVerifier, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, doc, updateDoc, arrayUnion, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js";
        
        // Your Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyDjM1lRbEKtCsaYe9e48pEPReh0AMe910U",
            authDomain: "nevergram-e1d62.firebaseapp.com",
            projectId: "nevergram-e1d62",
            storageBucket: "nevergram-e1d62.firebasestorage.app",
            messagingSenderId: "355130485889",
            appId: "1:355130485889:web:d6657f9d2cf8b4e28b3180",
            measurementId: "G-Q0YRVZ1W1E"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const storage = getStorage(app);
        
        // DOM Elements
        let currentUser = null;
        let currentChat = null;
        let messagesUnsubscribe = null;
        
        // Phone authentication
        window.verifyPhone = async function() {
            const phoneNumber = document.getElementById('phoneNumber').value;
            const recaptcha = new RecaptchaVerifier(auth, 'recaptcha-container', {
                'size': 'invisible'
            });
            
            try {
                const confirmationResult = await signInWithPhoneNumber(auth, phoneNumber, recaptcha);
                window.confirmationResult = confirmationResult;
                document.getElementById('codeSection').style.display = 'block';
                document.getElementById('phoneSection').style.display = 'none';
                showToast('Код отправлен!', 'success');
            } catch (error) {
                showToast('Ошибка: ' + error.message, 'error');
            }
        };
        
        window.verifyCode = async function() {
            const code = document.getElementById('verificationCode').value;
            try {
                const result = await window.confirmationResult.confirm(code);
                currentUser = result.user;
                await createUserProfile(currentUser);
                showMainApp();
                showToast('Добро пожаловать в NeverGram!', 'success');
            } catch (error) {
                showToast('Неверный код: ' + error.message, 'error');
            }
        };
        
        async function createUserProfile(user) {
            const userRef = doc(db, 'users', user.uid);
            const userSnap = await getDoc(userRef);
            if (!userSnap.exists()) {
                await setDoc(userRef, {
                    uid: user.uid,
                    phone: user.phoneNumber,
                    name: 'User_' + user.phoneNumber.slice(-4),
                    avatar: getRandomAvatar(),
                    online: true,
                    createdAt: new Date()
                });
            }
            // Update online status
            await updateDoc(userRef, { online: true });
        }
        
        function getRandomAvatar() {
            const avatars = ['😀', '😎', '🦄', '🐉', '🤖', '👻', '⭐', '🔥', '💎', '🎨'];
            return avatars[Math.floor(Math.random() * avatars.length)];
        }
        
        // Load contacts
        window.loadContacts = async function() {
            const contactsList = document.getElementById('contactsList');
            contactsList.innerHTML = '<div class="loading">Загрузка контактов...</div>';
            
            const usersRef = collection(db, 'users');
            const q = query(usersRef);
            const unsubscribe = onSnapshot(q, (snapshot) => {
                contactsList.innerHTML = '';
                snapshot.forEach(doc => {
                    const user = doc.data();
                    if (user.uid !== currentUser?.uid) {
                        const contactDiv = createContactElement(user);
                        contactsList.appendChild(contactDiv);
                    }
                });
            });
        };
        
        function createContactElement(user) {
            const div = document.createElement('div');
            div.className = 'contact-item';
            div.innerHTML = `
                <div class="contact-avatar">${user.avatar || '👤'}</div>
                <div class="contact-info">
                    <h4>${user.name}</h4>
                    <p>${user.phone}</p>
                    <span class="online-status ${user.online ? 'online' : 'offline'}"></span>
                </div>
            `;
            div.onclick = () => openChat(user);
            return div;
        }
        
        // Open chat with user
        window.openChat = async function(user) {
            currentChat = user;
            document.getElementById('chatHeaderName').textContent = user.name;
            document.getElementById('chatHeaderAvatar').textContent = user.avatar || '👤';
            document.getElementById('contactsPanel').style.display = 'none';
            document.getElementById('chatPanel').style.display = 'flex';
            
            // Load messages
            if (messagesUnsubscribe) messagesUnsubscribe();
            
            const chatId = getChatId(currentUser.uid, user.uid);
            const messagesRef = collection(db, 'chats', chatId, 'messages');
            const q = query(messagesRef, orderBy('timestamp', 'asc'));
            
            messagesUnsubscribe = onSnapshot(q, (snapshot) => {
                const messagesContainer = document.getElementById('messagesContainer');
                messagesContainer.innerHTML = '';
                snapshot.forEach(doc => {
                    const message = doc.data();
                    appendMessage(message);
                });
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
        };
        
        function getChatId(uid1, uid2) {
            return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;
        }
        
        function appendMessage(message) {
            const container = document.getElementById('messagesContainer');
            const msgDiv = document.createElement('div');
            const isOutgoing = message.senderId === currentUser.uid;
            msgDiv.className = `message ${isOutgoing ? 'outgoing' : 'incoming'}`;
            
            const time = message.timestamp?.toDate().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) || 'Just now';
            
            if (message.type === 'text') {
                msgDiv.innerHTML = `
                    <div class="message-text">${escapeHtml(message.text)}</div>
                    <div class="message-meta">${time}</div>
                `;
            } else if (message.type === 'image') {
                msgDiv.innerHTML = `
                    <img src="${message.imageUrl}" class="message-image" onclick="window.open('${message.imageUrl}')">
                    <div class="message-meta">${time}</div>
                `;
            }
            
            container.appendChild(msgDiv);
        }
        
        // Send message
        window.sendMessage = async function() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !currentChat) return;
            
            const chatId = getChatId(currentUser.uid, currentChat.uid);
            const messagesRef = collection(db, 'chats', chatId, 'messages');
            
            await addDoc(messagesRef, {
                text: text,
                senderId: currentUser.uid,
                senderName: currentUser.name,
                type: 'text',
                timestamp: new Date()
            });
            
            input.value = '';
        };
        
        // Send image
        window.sendImage = async function() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (file && currentChat) {
                    const storageRef = ref(storage, `images/${Date.now()}_${file.name}`);
                    await uploadBytes(storageRef, file);
                    const imageUrl = await getDownloadURL(storageRef);
                    
                    const chatId = getChatId(currentUser.uid, currentChat.uid);
                    const messagesRef = collection(db, 'chats', chatId, 'messages');
                    await addDoc(messagesRef, {
                        imageUrl: imageUrl,
                        senderId: currentUser.uid,
                        senderName: currentUser.name,
                        type: 'image',
                        timestamp: new Date()
                    });
                }
            };
            input.click();
        };
        
        // Back to contacts
        window.backToContacts = function() {
            document.getElementById('contactsPanel').style.display = 'block';
            document.getElementById('chatPanel').style.display = 'none';
            if (messagesUnsubscribe) messagesUnsubscribe();
        };
        
        // Logout
        window.logout = async function() {
            if (currentUser) {
                const userRef = doc(db, 'users', currentUser.uid);
                await updateDoc(userRef, { online: false });
            }
            await signOut(auth);
            location.reload();
        };
        
        function showMainApp() {
            document.getElementById('authScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'flex';
            loadContacts();
            
            // Set user info
            document.getElementById('userName').textContent = currentUser?.name || 'User';
            document.getElementById('userPhone').textContent = currentUser?.phoneNumber || '';
        }
        
        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        // Check auth state
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                createUserProfile(user);
                showMainApp();
            }
        });
        
        // Expose functions to global
        window.verifyPhone = verifyPhone;
        window.verifyCode = verifyCode;
        window.sendMessage = sendMessage;
        window.sendImage = sendImage;
        window.backToContacts = backToContacts;
        window.logout = logout;
    </script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f0f0f;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }
        
        :root {
            --tg-bg: #17212b;
            --tg-surface: #1f2a36;
            --tg-secondary: #242f3d;
            --tg-accent: #2b70a9;
            --tg-text-secondary: #8e9eac;
            --tg-divider: #2c3b4b;
            --tg-online: #2ba640;
        }
        
        /* Auth Screen */
        .auth-screen {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #17212b 0%, #0f171f 100%);
            padding: 20px;
        }
        
        .auth-card {
            background: var(--tg-surface);
            border-radius: 28px;
            padding: 32px;
            width: 100%;
            max-width: 380px;
            text-align: center;
        }
        
        .auth-card input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: var(--tg-secondary);
            border: 1px solid var(--tg-divider);
            border-radius: 12px;
            color: white;
            font-size: 16px;
        }
        
        .btn {
            width: 100%;
            padding: 14px;
            background: var(--tg-accent);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }
        
        /* Main App */
        .main-app {
            display: none;
            flex-direction: column;
            height: 100vh;
        }
        
        /* Header */
        .header {
            background: var(--tg-bg);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--tg-divider);
        }
        
        /* Contacts Panel */
        .contacts-panel {
            flex: 1;
            overflow-y: auto;
        }
        
        .contact-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 16px;
            cursor: pointer;
            border-bottom: 1px solid var(--tg-divider);
            transition: background 0.2s;
        }
        
        .contact-item:active {
            background: var(--tg-surface);
        }
        
        .contact-avatar {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--tg-accent), #1a4a6e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
        }
        
        /* Chat Panel */
        .chat-panel {
            display: none;
            flex-direction: column;
            flex: 1;
        }
        
        .chat-header {
            background: var(--tg-bg);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid var(--tg-divider);
        }
        
        .back-btn {
            background: none;
            border: none;
            color: var(--tg-accent);
            font-size: 24px;
            cursor: pointer;
            padding: 8px;
        }
        
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
        }
        
        .message.outgoing {
            background: var(--tg-accent);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        
        .message.incoming {
            background: var(--tg-surface);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        
        .message-image {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            cursor: pointer;
        }
        
        .message-meta {
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            margin-top: 5px;
        }
        
        .input-area {
            padding: 12px 16px;
            background: var(--tg-surface);
            border-top: 1px solid var(--tg-divider);
            display: flex;
            gap: 10px;
        }
        
        .input-area input {
            flex: 1;
            padding: 12px;
            background: var(--tg-secondary);
            border: none;
            border-radius: 24px;
            color: white;
            font-size: 15px;
        }
        
        .icon-btn {
            background: var(--tg-accent);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 20px;
            cursor: pointer;
        }
        
        .online-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-left: 8px;
        }
        
        .online-status.online {
            background: var(--tg-online);
        }
        
        .online-status.offline {
            background: gray;
        }
        
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            border-radius: 24px;
            background: rgba(0,0,0,0.9);
            color: white;
            z-index: 1000;
            animation: fadeInUp 0.3s ease;
        }
        
        .toast.success {
            background: #2ba640;
        }
        
        .toast.error {
            background: #e53935;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--tg-text-secondary);
        }
        
        #recaptcha-container {
            position: fixed;
            bottom: 0;
            right: 0;
            z-index: 9999;
        }
    </style>
</head>
<body>
    <!-- Auth Screen -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <h1 style="margin-bottom: 20px;">✨ NeverGram</h1>
            <div id="phoneSection">
                <input type="tel" id="phoneNumber" placeholder="+7XXXXXXXXXX" value="+79991234567">
                <button class="btn" onclick="verifyPhone()">📱 Войти по номеру</button>
            </div>
            <div id="codeSection" style="display: none;">
                <input type="text" id="verificationCode" placeholder="Введите код из SMS">
                <button class="btn" onclick="verifyCode()">✅ Подтвердить</button>
            </div>
            <div id="recaptcha-container"></div>
        </div>
    </div>
    
    <!-- Main App -->
    <div id="mainApp" class="main-app">
        <div class="header">
            <div>
                <span id="userName" style="font-size: 18px; font-weight: 600;"></span>
                <p id="userPhone" style="font-size: 12px; color: var(--tg-text-secondary);"></p>
            </div>
            <button class="icon-btn" onclick="logout()" style="background: none; font-size: 22px;">🚪</button>
        </div>
        
        <!-- Contacts Panel -->
        <div id="contactsPanel" class="contacts-panel">
            <div style="padding: 12px 16px;">
                <input type="text" placeholder="🔍 Поиск..." style="width: 100%; padding: 10px; background: var(--tg-secondary); border: none; border-radius: 20px; color: white;">
            </div>
            <div id="contactsList"></div>
        </div>
        
        <!-- Chat Panel -->
        <div id="chatPanel" class="chat-panel">
            <div class="chat-header">
                <button class="back-btn" onclick="backToContacts()">←</button>
                <div class="contact-avatar" id="chatHeaderAvatar" style="width: 40px; height: 40px; font-size: 20px;">👤</div>
                <h3 id="chatHeaderName"></h3>
            </div>
            <div id="messagesContainer" class="messages-container"></div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Напишите сообщение..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="icon-btn" onclick="sendImage()">📷</button>
                <button class="icon-btn" onclick="sendMessage()">📤</button>
            </div>
        </div>
    </div>
</body>
</html>
