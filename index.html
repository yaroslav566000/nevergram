<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Telegram NFT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #0f0f0f; color: #fff; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }
        #app { width: 100%; max-width: 420px; height: 100%; max-height: 900px; background: #0f0f0f; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        @media (min-width: 600px) { #app { border-radius: 20px; border: 1px solid #333; box-shadow: 0 0 30px rgba(0,0,0,0.8); } }
        .page { display: none; height: 100%; flex-direction: column; overflow-y: auto; padding-bottom: 60px; }
        .page.active { display: flex; }
        .header { padding: 10px 15px; background: #0f0f0f; border-bottom: 1px solid #222; display: flex; align-items: center; height: 50px; position: sticky; top: 0; }
        .header h2 { flex: 1; font-size: 17px; font-weight: 600; }
        .bottom-nav { position: absolute; bottom: 0; width: 100%; height: 60px; background: #1a1a1a; display: flex; justify-content: space-around; align-items: center; border-top: 1px solid #333; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #aaa; font-size: 9px; cursor: pointer; padding: 3px 10px; }
        .nav-item i { font-size: 20px; margin-bottom: 2px; }
        .nav-item.active { color: #6ab2e4; }
        
        /* Auth */
        .auth-screen { padding: 40px 20px; display: flex; flex-direction: column; align-items: center; }
        .auth-screen input { width: 100%; padding: 12px; background: #1f1f1f; border: 1px solid #333; border-radius: 10px; color: #fff; margin-bottom: 10px; }
        .auth-screen button { width: 100%; padding: 12px; background: #6ab2e4; border: none; border-radius: 10px; font-weight: bold; margin-top: 5px; cursor: pointer; }
        .auth-link { color: #6ab2e4; cursor: pointer; margin-top: 15px; font-size: 14px; }
        
        /* Search */
        .search-input { width: 100%; padding: 12px; background: #1f1f1f; border: none; border-radius: 10px; color: #fff; margin: 10px; }
        .user-result { padding: 10px 15px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-result .avatar { width: 40px; height: 40px; border-radius: 50%; background: #444; display: flex; align-items: center; justify-content: center; }
        
        /* Chat */
        .chat-list-item { display: flex; padding: 10px 15px; border-bottom: 1px solid #222; cursor: pointer; align-items: center; gap: 10px; }
        .chat-list-item .avatar { width: 45px; height: 45px; border-radius: 50%; background: #444; display: flex; align-items: center; justify-content: center; }
        #chat-window { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f0f; z-index: 200; display: none; flex-direction: column; }
        #chat-window.open { display: flex; }
        .messages-area { flex: 1; padding: 10px; overflow-y: auto; display: flex; flex-direction: column; }
        .msg { padding: 8px 12px; border-radius: 12px; margin-bottom: 5px; max-width: 80%; font-size: 15px; }
        .msg.sent { background: #6ab2e4; color: #000; align-self: flex-end; }
        .msg.received { background: #1f1f1f; align-self: flex-start; }
        .input-area { display: flex; padding: 8px; background: #1f1f1f; gap: 8px; border-top: 1px solid #333; }
        .input-area input { flex: 1; padding: 10px; border-radius: 20px; border: none; background: #0f0f0f; color: white; }
        .input-area button { background: #6ab2e4; border: none; padding: 0 15px; border-radius: 20px; color: #000; font-weight: bold; cursor: pointer; }
        
        /* Stars & NFT */
        .stars-wrapper { padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .balance-card { background: #1f1f1f; border-radius: 16px; padding: 15px; width: 100%; text-align: center; margin-top: 10px; }
        .balance-row { display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 30px; font-weight: 700; }
        .balance-row i { color: #ffd700; font-size: 24px; }
        .balance-label { color: #aaa; font-size: 13px; margin: 4px 0 12px 0; }
        .btn-group { display: flex; gap: 8px; }
        .btn-blue { flex: 1; background: #6ab2e4; color: #000; border: none; border-radius: 30px; padding: 10px 0; font-weight: 600; font-size: 13px; cursor: pointer; }
        
        .nft-list { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 8px; padding-bottom: 70px; }
        .nft-card { background: transparent; border-radius: 0; padding: 0; cursor: pointer; aspect-ratio: 1/1.1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; border: none; overflow: hidden; }
        .nft-card img { width: 100%; height: 100%; object-fit: cover; }
        .nft-card .nft-info { display: none; }
        
        #detail-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f0f; z-index: 300; display: none; flex-direction: column; }
        #detail-screen.open { display: flex; }
        .detail-img-area { height: 45%; display: flex; align-items: center; justify-content: center; background: #1a1a1a; }
        .detail-img-area img { max-height: 90%; max-width: 90%; object-fit: contain; border-radius: 12px; }
        .detail-info { padding: 15px; flex: 1; }
        .detail-title { font-size: 20px; font-weight: bold; }
        .detail-desc { color: #aaa; font-size: 13px; margin: 5px 0 15px 0; }
        .detail-buy-btn { width: 100%; background: #6ab2e4; color: #000; border: none; padding: 12px; border-radius: 30px; font-weight: bold; font-size: 15px; cursor: pointer; }
        
        .collection-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 8px; }
        .collected-item { background: #1f1f1f; aspect-ratio: 1; border-radius: 8px; display: flex; align-items: center; justify-content: center; overflow: hidden; border: 1px solid #333; }
        .collected-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Partner Profile */
        #partner-profile { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #0f0f0f; z-index: 350; display: none; flex-direction: column; }
        #partner-profile.open { display: flex; }
        .partner-header { padding: 20px; text-align: center; }
        .partner-avatar { width: 80px; height: 80px; border-radius: 50%; background: #444; margin: 0 auto; display: flex; align-items: center; justify-content: center; font-size: 30px; }
        .partner-collection { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 8px; }

        /* Verified Badge */
        .verified-badge {
            color: #6ab2e4;
            font-size: 14px;
            cursor: pointer;
            margin-left: 4px;
            display: inline-block;
        }
        .verified-badge:hover {
            opacity: 0.8;
        }

        #page-auth { display: flex; }
        #app-content { display: none; height: 100%; flex-direction: column; }
        #app-content.visible { display: flex; }
        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

<div id="app">

    <!-- AUTH -->
    <div id="page-auth" class="page active">
        <div class="header"><h2>Вход</h2></div>
        <div class="auth-screen" id="login-form">
            <input id="login-phone" placeholder="+888">
            <input id="login-password" type="password" placeholder="Пароль">
            <button onclick="login()">Войти</button>
            <div id="auth-status" style="margin-top:10px; color:#aaa; font-size:13px;"></div>
            <div class="auth-link" onclick="showRegister()">Нет аккаунта? Зарегистрироваться</div>
        </div>
        <div class="auth-screen" id="register-form" style="display:none;">
            <input id="reg-username" placeholder="Никнейм">
            <input id="reg-password" type="password" placeholder="Пароль">
            <button onclick="register()">Зарегистрироваться</button>
            <div id="reg-status" style="margin-top:10px; color:#aaa; font-size:13px;"></div>
            <div class="auth-link" onclick="showLogin()">Уже есть аккаунт? Войти</div>
        </div>
    </div>

    <!-- APP CONTENT -->
    <div id="app-content">
        
        <!-- CHATS -->
        <div id="page-chats" class="page active">
            <div class="header"><h2>Чаты</h2></div>
            <div id="chat-list"></div>
        </div>

        <!-- SEARCH -->
        <div id="page-search" class="page">
            <div class="header"><h2>Поиск</h2></div>
            <input class="search-input" id="search-input" placeholder="Введите номер..." oninput="searchUser()">
            <div id="search-results"></div>
        </div>

        <!-- MARKET -->
        <div id="page-market" class="page">
            <div class="header"><h2>Маркет</h2></div>
            <div class="stars-wrapper">
                <div class="balance-card">
                    <div class="balance-row"><i class="fas fa-star"></i><span id="bal-text">5000</span></div>
                    <div class="balance-label">Ваш баланс</div>
                    <div class="btn-group"><button class="btn-blue" onclick="addStars()">Пополнить</button><button class="btn-blue">Статистика</button></div>
                </div>
            </div>
            <div class="nft-list" id="nft-list"></div>
        </div>

        <!-- DETAIL -->
        <div id="detail-screen">
            <div class="header">
                <i class="fas fa-arrow-left back-btn" onclick="closeDetail()"></i>
                <h2 id="detail-name">Pepe</h2>
            </div>
            <div class="detail-img-area"><img id="detail-main-img" src="" alt="NFT"></div>
            <div class="detail-info">
                <div class="detail-title" id="detail-title">Pepe</div>
                <div class="detail-desc">Уникальный плюшевый Pepe.</div>
                <div style="font-size:18px; font-weight:bold; color:#ffd700; margin-bottom:15px;">
                    <i class="fas fa-star"></i> <span id="detail-price">0</span>
                </div>
                <button class="detail-buy-btn" onclick="buyDetailNFT()">Купить</button>
            </div>
        </div>

        <!-- PROFILE -->
        <div id="page-profile" class="page">
            <div class="header"><h2>Профиль</h2></div>
            <div style="padding:20px; text-align:center;">
                <div style="width:80px; height:80px; border-radius:50%; background:#444; margin:0 auto; display:flex; align-items:center; justify-content:center; font-size:30px;"></div>
                <h3 id="profile-name">Гость</h3>
                <div style="color:#aaa; font-size:13px;">Номер: <span id="profile-phone">---</span></div>
                <div style="color:#ffd700; margin-top:5px;">Баланс: <span id="prof-bal">5000</span> ⭐</div>
            </div>
            <h4 style="padding-left:15px;">Мои NFT</h4>
            <div class="collection-grid" id="my-collection"></div>
        </div>

        <!-- PARTNER PROFILE -->
        <div id="partner-profile">
            <div class="header">
                <i class="fas fa-arrow-left back-btn" onclick="closePartnerProfile()"></i>
                <h2 id="partner-name">Профиль</h2>
            </div>
            <div class="partner-header">
                <div class="partner-avatar" id="partner-avatar">👤</div>
                <h3 id="partner-username">Пользователь</h3>
                <div style="color:#aaa; font-size:13px;">Номер: <span id="partner-phone">---</span></div>
            </div>
            <h4 style="padding-left:15px;">NFT</h4>
            <div class="partner-collection" id="partner-collection"></div>
        </div>

        <!-- NAV -->
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('chats', this)"><i class="fas fa-comments"></i><span>Чаты</span></div>
            <div class="nav-item" onclick="switchTab('search', this)"><i class="fas fa-search"></i><span>Поиск</span></div>
            <div class="nav-item" onclick="switchTab('market', this)"><i class="fas fa-store"></i><span>Маркет</span></div>
            <div class="nav-item" onclick="switchTab('profile', this)"><i class="fas fa-user"></i><span>Профиль</span></div>
        </nav>

        <!-- CHAT WINDOW -->
        <div id="chat-window">
            <div class="header">
                <i class="fas fa-arrow-left back-btn" onclick="closeChat()"></i>
                <h2 id="chat-partner-name">Чат</h2>
                <i class="fas fa-user" style="font-size:20px; cursor:pointer;" onclick="openPartnerProfile()"></i>
            </div>
            <div class="messages-area" id="messages-container"></div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Сообщение...">
                <button onclick="sendMessage()">Отправить</button>
            </div>
        </div>

    </div>

</div>

<script>
    // ============================
    // FIREBASE
    // ============================
    const firebaseConfig = {
        apiKey: "AIzaSyDjM1lRbEKtCsaYe9e48pEPReh0AMe910U",
        authDomain: "nevergram-e1d62.firebaseapp.com",
        projectId: "nevergram-e1d62",
        storageBucket: "nevergram-e1d62.firebasestorage.app",
        messagingSenderId: "355130485889",
        appId: "1:355130485889:web:d6657f9d2cf8b4e28b3180",
        measurementId: "G-Q0YRVZ1W1E"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ============================
    // STATE
    // ============================
    let currentUser = null;
    let balance = 5000;
    let currentChatId = null;
    let chatUnsubscriber = null;
    let currentPartnerId = null;

    // ============================
    // NFT DATA (ВСТАВЬ СВОИ КАРТИНКИ)
    // ============================
    const nftCatalog = [
        { 
            id: 'nft1', 
            name: 'Синий Пепе', 
            price: 500, 
            img: '/* ВСТАВЬ BASE64 ЗДЕСЬ */' 
        },
        { 
            id: 'nft2', 
            name: 'Тёмный Пепе', 
            price: 600, 
            img: '/* ВСТАВЬ BASE64 ЗДЕСЬ */' 
        },
        { 
            id: 'nft3', 
            name: 'Огненный Пепе', 
            price: 700, 
            img: '/* ВСТАВЬ BASE64 ЗДЕСЬ */' 
        },
        { 
            id: 'nft4', 
            name: 'Ледяной Пепе', 
            price: 800, 
            img: '/* ВСТАВЬ BASE64 ЗДЕСЬ */' 
        }
    ];

    // ============================
    // UI
    // ============================
    function showRegister() {
        document.getElementById('login-form').style.display = 'none';
        document.getElementById('register-form').style.display = 'flex';
    }
    function showLogin() {
        document.getElementById('login-form').style.display = 'flex';
        document.getElementById('register-form').style.display = 'none';
    }
    function switchTab(tab, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + tab).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }
    function updateBalance() {
        document.getElementById('bal-text').innerText = balance;
        document.getElementById('prof-bal').innerText = balance;
    }
    function addStars() { balance += 100; updateBalance(); if (currentUser) db.collection('users').doc(currentUser.id).update({ balance }); }

    // ============================
    // AUTH
    // ============================
    async function login() {
        const phone = document.getElementById('login-phone').value.trim();
        const password = document.getElementById('login-password').value.trim();
        if (!phone || !password) return document.getElementById('auth-status').innerText = 'Заполните поля';
        const snap = await db.collection('users').where('phone', '==', phone).get();
        if (snap.empty) return document.getElementById('auth-status').innerText = 'Не найден';
        const data = snap.docs[0].data();
        if (data.password !== password) return document.getElementById('auth-status').innerText = 'Неверный пароль';
        currentUser = { id: snap.docs[0].id, ...data };
        afterLogin();
    }

    async function register() {
        const username = document.getElementById('reg-username').value.trim();
        const password = document.getElementById('reg-password').value.trim();
        if (!username || !password) return document.getElementById('reg-status').innerText = 'Заполните поля';
        const phone = '+9' + Math.random().toString(36).substring(2, 11);
        const doc = await db.collection('users').add({ phone, username, password, balance: 5000 });
        currentUser = { id: doc.id, phone, username, balance: 5000 };
        afterLogin();
    }

    function afterLogin() {
        document.getElementById('page-auth').style.display = 'none';
        document.getElementById('app-content').classList.add('visible');
        document.getElementById('profile-name').innerText = currentUser.username;
        document.getElementById('profile-phone').innerText = currentUser.phone;
        balance = currentUser.balance || 5000;
        updateBalance();
        loadChats();
        renderCollection();
        const nav = document.querySelector('.nav-item:first-child');
        switchTab('chats', nav);
    }

    // ============================
    // SEARCH
    // ============================
    async function searchUser() {
        const q = document.getElementById('search-input').value.trim();
        const c = document.getElementById('search-results');
        if (q.length < 3) return c.innerHTML = '';
        const snap = await db.collection('users').where('phone', '==', q).get();
        c.innerHTML = '';
        snap.forEach(d => {
            const data = d.data();
            if (data.phone === currentUser.phone) return c.innerHTML = '<div style="padding:10px;color:#aaa;">Это вы</div>';
            const verified = data.phone === '+888' ? ' <span class="verified-badge" onclick="showVerifiedMessage()"><i class="fas fa-check-circle"></i></span>' : '';
            c.innerHTML += `
                <div class="user-result" onclick="startChat('${d.id}','${data.username}','${data.phone}')">
                    <div class="avatar">👤</div>
                    <div><div style="font-weight:bold;">${data.username}${verified}</div><div style="color:#aaa;font-size:12px;">${data.phone}</div></div>
                </div>
            `;
        });
    }

    // ============================
    // CHATS
    // ============================
    async function loadChats() {
        const c = document.getElementById('chat-list');
        c.innerHTML = '<div style="padding:20px;color:#aaa;text-align:center;">Загрузка...</div>';
        const snap = await db.collection('chats').where('participants', 'array-contains', currentUser.phone).get();
        c.innerHTML = '';
        if (snap.empty) return c.innerHTML = '<div style="padding:20px;color:#aaa;text-align:center;">Нет чатов</div>';
        snap.forEach(d => {
            const data = d.data();
            const partner = data.participants.find(p => p !== currentUser.phone);
            const name = data.participantNames?.[partner] || 'Неизвестно';
            const verified = partner === '+888' ? ' <span class="verified-badge" onclick="showVerifiedMessage()"><i class="fas fa-check-circle"></i></span>' : '';
            c.innerHTML += `
                <div class="chat-list-item" onclick="openChat('${d.id}','${name}','${partner}')">
                    <div class="avatar">👤</div>
                    <div><div style="font-weight:bold;">${name}${verified}</div><div style="color:#aaa;font-size:12px;">${partner}</div></div>
                </div>
            `;
        });
    }

    async function startChat(pid, pname, pphone) {
        const snap = await db.collection('chats').where('participants', '==', [currentUser.phone, pphone]).get();
        let id;
        if (snap.empty) {
            const ref = await db.collection('chats').add({
                participants: [currentUser.phone, pphone],
                participantNames: { [currentUser.phone]: currentUser.username, [pphone]: pname }
            });
            id = ref.id;
        } else id = snap.docs[0].id;
        openChat(id, pname, pphone);
        loadChats();
    }

    function openChat(id, name, phone) {
        currentChatId = id;
        currentPartnerId = phone;
        document.getElementById('chat-partner-name').innerText = name;
        document.getElementById('chat-window').classList.add('open');
        const c = document.getElementById('messages-container');
        c.innerHTML = '';
        if (chatUnsubscriber) chatUnsubscriber();
        chatUnsubscriber = db.collection('chats').doc(id).collection('messages').orderBy('timestamp')
            .onSnapshot(snap => {
                c.innerHTML = '';
                snap.forEach(d => {
                    const data = d.data();
                    const div = document.createElement('div');
                    div.className = `msg ${data.sender === currentUser.phone ? 'sent' : 'received'}`;
                    div.innerText = data.text;
                    c.appendChild(div);
                });
                c.scrollTop = c.scrollHeight;
            });
    }

    function closeChat() {
        document.getElementById('chat-window').classList.remove('open');
        if (chatUnsubscriber) { chatUnsubscriber(); chatUnsubscriber = null; }
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value;
        if (!text || !currentChatId) return;
        db.collection('chats').doc(currentChatId).collection('messages').add({
            sender: currentUser.phone,
            text,
            timestamp: new Date()
        });
        input.value = '';
    }

    // ============================
    // PARTNER PROFILE
    // ============================
    async function openPartnerProfile() {
        if (!currentPartnerId) return;
        document.getElementById('partner-profile').classList.add('open');
        document.getElementById('partner-name').innerText = 'Профиль';
        
        const snap = await db.collection('users').where('phone', '==', currentPartnerId).get();
        if (snap.empty) return;
        const data = snap.docs[0].data();
        const verified = data.phone === '+888' ? ' <span class="verified-badge" onclick="showVerifiedMessage()"><i class="fas fa-check-circle"></i></span>' : '';
        document.getElementById('partner-username').innerHTML = `${data.username || 'Пользователь'}${verified}`;
        document.getElementById('partner-phone').innerText = data.phone || '---';
        
        const invSnap = await snap.docs[0].ref.collection('inventory').get();
        const c = document.getElementById('partner-collection');
        c.innerHTML = '';
        if (invSnap.empty) {
            c.innerHTML = '<div style="color:#aaa;text-align:center;padding:20px;">NFT отсутствуют</div>';
            return;
        }
        invSnap.forEach(doc => {
            const item = doc.data();
            c.innerHTML += `
                <div class="collected-item"><img src="${item.img}" alt="${item.name}"></div>
            `;
        });
    }

    function closePartnerProfile() {
        document.getElementById('partner-profile').classList.remove('open');
    }

    // Сообщение при нажатии на галочку
    function showVerifiedMessage() {
        alert('Профиль пользователя подтверждён');
    }

    // ============================
    // NFT MARKET
    // ============================
    function renderMarket() {
        const c = document.getElementById('nft-list');
        c.innerHTML = nftCatalog.map(n => `
            <div class="nft-card" onclick="openDetail('${n.id}')">
                <img src="${n.img}" alt="${n.name}">
            </div>
        `).join('');
    }

    let currentNFT = null;

    function openDetail(id) {
        const n = nftCatalog.find(x => x.id === id);
        if (!n) return;
        currentNFT = n;
        document.getElementById('detail-screen').classList.add('open');
        document.getElementById('detail-name').innerText = n.name;
        document.getElementById('detail-title').innerText = n.name;
        document.getElementById('detail-main-img').src = n.img;
        document.getElementById('detail-price').innerText = n.price;
    }

    function closeDetail() { document.getElementById('detail-screen').classList.remove('open'); }

    async function buyDetailNFT() {
        if (!currentNFT) return;
        if (balance < currentNFT.price) return alert('Недостаточно звёзд!');
        balance -= currentNFT.price;
        
        await db.collection('users').doc(currentUser.id).collection('inventory').add({
            name: currentNFT.name,
            price: currentNFT.price,
            img: currentNFT.img,
            purchasedAt: new Date()
        });
        
        updateBalance();
        if (currentUser) db.collection('users').doc(currentUser.id).update({ balance });
        await renderCollection();
        closeDetail();
        alert('Куплено!');
    }

    async function renderCollection() {
        const c = document.getElementById('my-collection');
        c.innerHTML = '<div style="color:#aaa;text-align:center;padding:20px;">Загрузка...</div>';
        
        if (!currentUser) return;
        
        const snap = await db.collection('users').doc(currentUser.id).collection('inventory').get();
        
        c.innerHTML = '';
        if (snap.empty) {
            c.innerHTML = '<div style="color:#aaa;text-align:center;padding:20px;">Коллекция пуста</div>';
            return;
        }
        
        snap.forEach(doc => {
            const data = doc.data();
            c.innerHTML += `
                <div class="collected-item"><img src="${data.img}" alt="${data.name}"></div>
            `;
        });
    }

    // ============================
    // START
    // ============================
    renderMarket();
    renderCollection();
    updateBalance();
</script>

</body>
</html>
