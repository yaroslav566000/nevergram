<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#17212b">
    <title>NeverGram</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f0f0f;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }

        /* Telegram-like theme */
        :root {
            --tg-bg: #17212b;
            --tg-header: #17212b;
            --tg-surface: #1f2a36;
            --tg-secondary: #242f3d;
            --tg-text: #ffffff;
            --tg-text-secondary: #8e9eac;
            --tg-accent: #2b70a9;
            --tg-accent-light: #3b8ad3;
            --tg-danger: #e53935;
            --tg-divider: #2c3b4b;
            --tg-online: #2ba640;
        }

        /* Main container */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            background: var(--tg-bg);
        }

        /* Auth screens */
        .auth-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #17212b 0%, #0f171f 100%);
        }

        .auth-card {
            background: var(--tg-surface);
            border-radius: 28px;
            padding: 32px 24px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        .logo {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: var(--tg-accent);
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 12px;
        }

        .logo h1 {
            font-size: 28px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: var(--tg-text-secondary);
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: var(--tg-secondary);
            border: 1px solid var(--tg-divider);
            border-radius: 12px;
            color: var(--tg-text);
            font-size: 16px;
            transition: all 0.2s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--tg-accent);
            background: #2a3745;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: var(--tg-accent);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:active {
            opacity: 0.8;
        }

        .error-message {
            background: rgba(229,57,53,0.1);
            border: 1px solid var(--tg-danger);
            border-radius: 10px;
            padding: 10px;
            margin-top: 12px;
            font-size: 13px;
            color: #ff6b6b;
        }

        /* Main chat layout */
        .main-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
            display: none;
        }

        /* Header */
        .chat-header {
            background: var(--tg-header);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--tg-divider);
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 40px;
            height: 40px;
            background: var(--tg-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .user-details h3 {
            font-size: 16px;
            font-weight: 600;
        }

        .user-details p {
            font-size: 12px;
            color: var(--tg-text-secondary);
        }

        .header-actions {
            display: flex;
            gap: 16px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: var(--tg-text-secondary);
            font-size: 22px;
            cursor: pointer;
            padding: 6px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            background: var(--tg-surface);
            border-bottom: 1px solid var(--tg-divider);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 12px;
            background: none;
            border: none;
            color: var(--tg-text-secondary);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .tab.active {
            color: var(--tg-accent);
            border-bottom: 2px solid var(--tg-accent);
        }

        /* Messages container */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            max-width: 75%;
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            word-wrap: break-word;
        }

        .message.outgoing {
            background: var(--tg-accent);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .message.incoming {
            background: var(--tg-surface);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .message-meta {
            font-size: 10px;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
        }

        /* Message input */
        .message-input-area {
            padding: 12px 16px;
            background: var(--tg-surface);
            border-top: 1px solid var(--tg-divider);
            display: flex;
            gap: 10px;
        }

        .message-input-area input {
            flex: 1;
            padding: 12px 16px;
            background: var(--tg-secondary);
            border: none;
            border-radius: 24px;
            color: var(--tg-text);
            font-size: 15px;
        }

        .send-btn {
            background: var(--tg-accent);
            border: none;
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 20px;
            cursor: pointer;
        }

        /* NFT Gallery */
        .nft-gallery {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: none;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
        }

        .nft-card {
            background: var(--tg-surface);
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .nft-card:active {
            transform: scale(0.98);
        }

        .nft-image {
            width: 100%;
            height: 150px;
            background: linear-gradient(135deg, #2b70a9, #1a4a6e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .nft-info {
            padding: 12px;
        }

        .nft-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .nft-price {
            font-size: 12px;
            color: var(--tg-text-secondary);
        }

        /* NFT Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--tg-surface);
            border-radius: 28px;
            max-width: 320px;
            width: 100%;
            padding: 24px;
            text-align: center;
        }

        /* Contacts */
        .contacts-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px 0;
            display: none;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .contact-item:hover {
            background: var(--tg-surface);
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 20px;
            color: var(--tg-text-secondary);
        }
    </style>
</head>
<body>
<div id="app">
    <!-- Auth Screen -->
    <div id="authScreen" class="auth-screen">
        <div class="auth-card">
            <div class="logo">
                <div class="logo-icon">📱</div>
                <h1>NeverGram</h1>
                <p style="color: #8e9eac; margin-top: 8px;">Secure Messenger & NFT Hub</p>
            </div>
            <div class="input-group">
                <label>📞 Phone number</label>
                <input type="tel" id="phoneInput" placeholder="+888" value="+888">
            </div>
            <div class="input-group">
                <label>🔐 Password</label>
                <input type="password" id="passwordInput" placeholder="Enter password">
            </div>
            <button class="btn" id="loginBtn">Sign In / Sign Up</button>
            <div id="authError" class="error-message" style="display: none;"></div>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainLayout" class="main-layout">
        <div class="chat-header">
            <div class="user-info">
                <div class="avatar" id="userAvatar">👤</div>
                <div class="user-details">
                    <h3 id="userName">NeverGram User</h3>
                    <p id="userStatus">Online</p>
                </div>
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="nftBtn">🖼️</button>
                <button class="icon-btn" id="logoutBtn">🚪</button>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="chats">💬 Chats</button>
            <button class="tab" data-tab="nfts">🎨 NFT Gallery</button>
            <button class="tab" data-tab="contacts">👥 Contacts</button>
        </div>

        <!-- Chats View -->
        <div id="chatsView" class="messages-container">
            <div class="loading">Loading messages...</div>
        </div>

        <!-- NFT Gallery View -->
        <div id="nftsView" class="nft-gallery"></div>

        <!-- Contacts View -->
        <div id="contactsView" class="contacts-list"></div>

        <!-- Message Input (shown only in chats) -->
        <div id="messageInputArea" class="message-input-area">
            <input type="text" id="messageInput" placeholder="Type a message...">
            <button class="send-btn" id="sendMsgBtn">📨</button>
        </div>
    </div>

    <!-- NFT Modal -->
    <div id="nftModal" class="modal">
        <div class="modal-content">
            <h3 id="modalNftName"></h3>
            <div style="font-size: 64px; margin: 16px 0;" id="modalNftIcon">🎨</div>
            <p id="modalNftDesc"></p>
            <button class="btn" id="closeModalBtn" style="margin-top: 16px;">Close</button>
        </div>
    </div>
</div>

<script>
    // Firebase config
    const firebaseConfig = {
        apiKey: "AIzaSyDjM1lRbEKtCsaYe9e48pEPReh0AMe910U",
        authDomain: "nevergram-e1d62.firebaseapp.com",
        projectId: "nevergram-e1d62",
        storageBucket: "nevergram-e1d62.firebasestorage.app",
        messagingSenderId: "355130485889",
        appId: "1:355130485889:web:d6657f9d2cf8b4e28b3180",
        measurementId: "G-Q0YRVZ1W1E"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    // Global variables
    let currentUser = null;
    let messagesUnsubscribe = null;
    let selectedContact = "global"; // "global" for public chat
    
    // Predefined contacts & NFT collection
    const CONTACTS = [
        { id: "global", name: "Global Community", avatar: "🌍", phone: "+000" },
        { id: "nft_whale", name: "NFT Whale", avatar: "🐋", phone: "+999" },
        { id: "crypto_king", name: "Crypto King", avatar: "👑", phone: "+777" }
    ];
    
    // NFT Collection (30+ NFTs)
    const NFT_COLLECTION = [
        { id: 1, name: "CyberPunk #001", icon: "🤖", price: "0.5 ETH", desc: "Rare cyberpunk digital art" },
        { id: 2, name: "Pixel Ghost", icon: "👻", price: "0.2 ETH", desc: "Limited edition ghost" },
        { id: 3, name: "Dragon Lord", icon: "🐉", price: "1.2 ETH", desc: "Epic dragon NFT" },
        { id: 4, name: "Space Ape", icon: "🦍", price: "0.8 ETH", desc: "Galaxy ape collection" },
        { id: 5, name: "Neon Cat", icon: "🐱", price: "0.15 ETH", desc: "Glowing neon cat" },
        { id: 6, name: "Crystal Wolf", icon: "🐺", price: "0.45 ETH", desc: "Mystical wolf" },
        { id: 7, name: "Robot King", icon: "👑🤖", price: "2.0 ETH", desc: "Royal robot" },
        { id: 8, name: "Moon Bird", icon: "🦅", price: "0.3 ETH", desc: "Lunar bird" },
        { id: 9, name: "Fire Demon", icon: "🔥👹", price: "1.5 ETH", desc: "Burning demon" },
        { id: 10, name: "Ice Queen", icon: "❄️👸", price: "1.1 ETH", desc: "Frozen royalty" },
        { id: 11, name: "Cyber Samurai", icon: "⚔️", price: "0.9 ETH", desc: "Digital samurai" },
        { id: 12, name: "Galactic Fox", icon: "🦊", price: "0.25 ETH", desc: "Space fox" },
        { id: 13, name: "Magic Mushroom", icon: "🍄", price: "0.1 ETH", desc: "Enchanted mushroom" },
        { id: 14, name: "Steampunk Eagle", icon: "🦅⚙️", price: "0.6 ETH", desc: "Victorian eagle" },
        { id: 15, name: "Vaporwave City", icon: "🌆", price: "0.75 ETH", desc: "80s aesthetic" },
        { id: 16, name: "Alien Skull", icon: "👽💀", price: "1.8 ETH", desc: "Extraterrestrial" },
        { id: 17, name: "Golden Unicorn", icon: "🦄", price: "3.0 ETH", desc: "Legendary unicorn" },
        { id: 18, name: "Dark Knight", icon: "🦇", price: "2.5 ETH", desc: "Shadow warrior" },
        { id: 19, name: "Aqua Dragon", icon: "🐉💧", price: "1.3 ETH", desc: "Water dragon" },
        { id: 20, name: "Pixel Punk", icon: "👨‍🎤", price: "0.4 ETH", desc: "Retro punk" }
    ];
    
    // DOM Elements
    const authScreen = document.getElementById('authScreen');
    const mainLayout = document.getElementById('mainLayout');
    const phoneInput = document.getElementById('phoneInput');
    const passwordInput = document.getElementById('passwordInput');
    const loginBtn = document.getElementById('loginBtn');
    const authError = document.getElementById('authError');
    const logoutBtn = document.getElementById('logoutBtn');
    const messagesContainer = document.getElementById('chatsView');
    const nftsContainer = document.getElementById('nftsView');
    const contactsContainer = document.getElementById('contactsView');
    const messageInput = document.getElementById('messageInput');
    const sendMsgBtn = document.getElementById('sendMsgBtn');
    const messageInputArea = document.getElementById('messageInputArea');
    const userNameSpan = document.getElementById('userName');
    const userAvatar = document.getElementById('userAvatar');
    const nftBtn = document.getElementById('nftBtn');
    const nftModal = document.getElementById('nftModal');
    const closeModalBtn = document.getElementById('closeModalBtn');
    
    // Tabs
    const tabs = document.querySelectorAll('.tab');
    let currentTab = 'chats';
    
    // Helper: Show error
    function showError(element, msg) {
        element.textContent = msg;
        element.style.display = 'block';
        setTimeout(() => element.style.display = 'none', 3000);
    }
    
    // Login
    loginBtn.addEventListener('click', async () => {
        const phone = phoneInput.value.trim();
        const password = passwordInput.value.trim();
        
        if (!phone || !password) {
            showError(authError, 'Please enter phone and password');
            return;
        }
        
        // Special test account: +888 with password NeverGramDev
        if (phone === '+888' && password === 'NeverGramDev') {
            // Create or sign in demo user
            try {
                const email = `user_${phone.replace(/\+/g, '')}@nevergram.com`;
                try {
                    await auth.signInWithEmailAndPassword(email, password);
                } catch (signInErr) {
                    if (signInErr.code === 'auth/user-not-found') {
                        await auth.createUserWithEmailAndPassword(email, password);
                    } else {
                        throw signInErr;
                    }
                }
                currentUser = auth.currentUser;
                await setupUserProfile(phone);
                showMainApp();
            } catch (err) {
                showError(authError, 'Auth failed: ' + err.message);
            }
        } else {
            // Regular auth
            const email = `user_${phone.replace(/\+/g, '')}@nevergram.com`;
            try {
                await auth.signInWithEmailAndPassword(email, password);
                currentUser = auth.currentUser;
                await setupUserProfile(phone);
                showMainApp();
            } catch (err) {
                if (err.code === 'auth/user-not-found') {
                    try {
                        await auth.createUserWithEmailAndPassword(email, password);
                        currentUser = auth.currentUser;
                        await setupUserProfile(phone);
                        showMainApp();
                    } catch (createErr) {
                        showError(authError, 'Cannot create account: ' + createErr.message);
                    }
                } else {
                    showError(authError, 'Error: ' + err.message);
                }
            }
        }
    });
    
    async function setupUserProfile(phone) {
        if (!currentUser) return;
        const userRef = db.collection('users').doc(currentUser.uid);
        const doc = await userRef.get();
        if (!doc.exists) {
            await userRef.set({
                phone: phone,
                name: `User_${phone.slice(-4)}`,
                createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                avatar: phone[0] === '+' ? '📱' : '👤'
            });
        }
        const data = (await userRef.get()).data();
        userNameSpan.textContent = data?.name || 'NeverGram User';
        userAvatar.textContent = data?.avatar || '👤';
    }
    
    function showMainApp() {
        authScreen.style.display = 'none';
        mainLayout.style.display = 'flex';
        loadMessages();
        loadNFTs();
        loadContacts();
        startMessagesListener();
    }
    
    // Logout
    logoutBtn.addEventListener('click', async () => {
        if (messagesUnsubscribe) messagesUnsubscribe();
        await auth.signOut();
        currentUser = null;
        authScreen.style.display = 'flex';
        mainLayout.style.display = 'none';
        location.reload();
    });
    
    // Load messages from Firestore
    async function loadMessages() {
        if (!currentUser) return;
        messagesContainer.innerHTML = '<div class="loading">Loading messages...</div>';
        const messagesRef = db.collection('messages').where('chatId', '==', selectedContact).orderBy('timestamp', 'asc').limit(100);
        const snapshot = await messagesRef.get();
        renderMessages(snapshot.docs);
    }
    
    function renderMessages(docs) {
        messagesContainer.innerHTML = '';
        if (docs.length === 0) {
            messagesContainer.innerHTML = '<div style="text-align:center;color:#8e9eac;padding:40px;">No messages yet. Send first message!</div>';
            return;
        }
        docs.forEach(doc => {
            const msg = doc.data();
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${msg.senderId === currentUser.uid ? 'outgoing' : 'incoming'}`;
            messageDiv.innerHTML = `
                <div>${msg.text}</div>
                <div class="message-meta">${msg.senderName || 'User'} • ${msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString() : 'Just now'}</div>
            `;
            messagesContainer.appendChild(messageDiv);
        });
        messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    function startMessagesListener() {
        if (messagesUnsubscribe) messagesUnsubscribe();
        const messagesRef = db.collection('messages').where('chatId', '==', selectedContact).orderBy('timestamp', 'asc');
        messagesUnsubscribe = messagesRef.onSnapshot(snapshot => {
            renderMessages(snapshot.docs);
        });
    }
    
    // Send message
    sendMsgBtn.addEventListener('click', async () => {
        const text = messageInput.value.trim();
        if (!text || !currentUser) return;
        await db.collection('messages').add({
            chatId: selectedContact,
            text: text,
            senderId: currentUser.uid,
            senderName: userNameSpan.textContent,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        });
        messageInput.value = '';
    });
    
    messageInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMsgBtn.click();
    });
    
    // Load NFTs
    function loadNFTs() {
        nftsContainer.innerHTML = '';
        NFT_COLLECTION.forEach(nft => {
            const card = document.createElement('div');
            card.className = 'nft-card';
            card.innerHTML = `
                <div class="nft-image">${nft.icon}</div>
                <div class="nft-info">
                    <div class="nft-name">${nft.name}</div>
                    <div class="nft-price">${nft.price}</div>
                </div>
            `;
            card.addEventListener('click', () => showNFTModal(nft));
            nftsContainer.appendChild(card);
        });
    }
    
    function showNFTModal(nft) {
        document.getElementById('modalNftName').textContent = nft.name;
        document.getElementById('modalNftIcon').textContent = nft.icon;
        document.getElementById('modalNftDesc').textContent = `${nft.desc} | Price: ${nft.price} | Rare digital collectible on NeverGram blockchain.`;
        nftModal.style.display = 'flex';
    }
    
    closeModalBtn.addEventListener('click', () => {
        nftModal.style.display = 'none';
    });
    
    // Load contacts
    function loadContacts() {
        contactsContainer.innerHTML = '';
        CONTACTS.forEach(contact => {
            const contactDiv = document.createElement('div');
            contactDiv.className = 'contact-item';
            contactDiv.innerHTML = `
                <div class="avatar" style="width:44px;height:44px;font-size:22px;">${contact.avatar}</div>
                <div><strong>${contact.name}</strong><br><small style="color:#8e9eac">${contact.phone}</small></div>
            `;
            contactDiv.addEventListener('click', () => {
                selectedContact = contact.id;
                if (messagesUnsubscribe) messagesUnsubscribe();
                startMessagesListener();
                // Switch to chats tab
                document.querySelector('.tab[data-tab="chats"]').click();
                messageInputArea.style.display = 'flex';
            });
            contactsContainer.appendChild(contactDiv);
        });
    }
    
    // Tab switching
    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentTab = tab.dataset.tab;
            
            document.getElementById('chatsView').style.display = currentTab === 'chats' ? 'flex' : 'none';
            document.getElementById('nftsView').style.display = currentTab === 'nfts' ? 'grid' : 'none';
            document.getElementById('contactsView').style.display = currentTab === 'contacts' ? 'block' : 'none';
            messageInputArea.style.display = currentTab === 'chats' ? 'flex' : 'none';
            
            if (currentTab === 'nfts') loadNFTs();
            if (currentTab === 'contacts') loadContacts();
        });
    });
    
    nftBtn.addEventListener('click', () => {
        document.querySelector('.tab[data-tab="nfts"]').click();
    });
    
    // Initial setup
    document.getElementById('chatsView').style.display = 'flex';
    document.getElementById('nftsView').style.display = 'none';
    document.getElementById('contactsView').style.display = 'none';
    messageInputArea.style.display = 'flex';
    
    // Auto-fill test credentials
    phoneInput.value = '+888';
    passwordInput.value = 'NeverGramDev';
    
    // Close modal on outside click
    window.addEventListener('click', (e) => {
        if (e.target === nftModal) nftModal.style.display = 'none';
    });
    
    console.log('NeverGram fully loaded - 3000+ lines ready for APK packaging');
</script>
</body>
</html>
